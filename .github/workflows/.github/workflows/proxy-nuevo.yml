name: 🛡️ Proxy Anti-Ban Seguro
on:
  workflow_dispatch

jobs:
  arrancar:
    runs-on: ubuntu-latest
    steps:
      - name: ⚙️ Instalar y Activar
        run: |
          apt update -y
          apt install -y wget curl
          wget -q https://raw.githubusercontent.com/serjs/socks5-server/master/install.sh
          chmod +x install.sh
          ./install.sh -u ADM -p JEICO777 -P 8888 --anti-detect --no-logs
          echo "✅ TU IP LIMPIA:"
          curl ifconfig.me
